<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanDownloader - Home</title>
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>

    <div class="bg-container"></div>
    <div class="glass-blob blob-1"></div>
    <div class="glass-blob blob-2"></div>

    <main class="main-container">
        <div class="glass-card">
            
            <header class="card-header">
                <h1>Van<span>Downloader</span></h1>
                <p>Tempel tautan media Anda untuk memulai pengunduhan cepat.</p>
            </header>

            <div class="tabs-wrapper">
                <div class="tabs">
                    <input type="radio" id="radio-1" name="tabs" value="tiktok" checked="">
                    <label class="tab" for="radio-1" title="TikTok">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 2.78-1.15 5.54-3.11 7.47-2.14 2.13-5.26 3.25-8.24 2.87-3.15-.4-5.91-2.58-6.93-5.59-.97-2.86-.4-6.19 1.63-8.52 1.78-2.04 4.54-3.18 7.23-2.92.11.01.12.13.12.24v4.04c-1.39-.23-2.92.06-4.04.91-1.11.83-1.74 2.22-1.61 3.63.15 1.51 1.25 2.82 2.69 3.28 1.48.48 3.23.08 4.29-1.04 1.09-1.15 1.47-2.83 1.44-4.41V.02z"/></svg>
                    </label>
                    <input type="radio" id="radio-2" name="tabs" value="instagram">
                    <label class="tab" for="radio-2" title="Instagram">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm8.5 1.5h-8.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5zM12 7.5a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9zm0 1.5a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm4.75-2.25a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z"/></svg>
                    </label>
                    <input type="radio" id="radio-3" name="tabs" value="spotify">
                    <label class="tab" for="radio-3" title="Spotify">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.684 14.44a.625.625 0 0 1-.861.208c-2.358-1.441-5.328-1.767-8.818-.968a.624.624 0 1 1-.291-1.214c3.823-.873 7.106-.499 9.761 1.123.328.2.433.626.209.851zm1.222-2.735a.782.782 0 0 1-1.077.257c-2.71-1.666-6.85-2.148-10.306-1.176a.78.78 0 1 1-.426-1.503c3.957-1.112 8.531-.572 11.551 1.282.385.236.505.748.258 1.14zm.116-2.868C14.773 8.878 8.566 8.653 4.992 9.736a.978.978 0 1 1-.564-1.874c4.103-1.244 10.96-.983 14.839 1.32.808.48.969 1.583.407 2.298-.445.567-1.229.742-1.652.457z"/></svg>
                    </label>
                    <span class="glider"></span>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <button id="btnPaste" class="icon-btn" type="button" title="Tempel URL">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 16H5V5h14v14zm-3-4H8v-2h8v2zm0-4H8v-2h8v2z"/></svg>
                    </button>
                    <input type="text" id="targetUrl" class="input" placeholder="Tempel URL di sini...">
                    <button id="btnSubmit" class="submit-btn" type="button" title="Proses">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>

                <div class="server-radiator" id="serverContainer">
                    <p>Pilih Server API:</p>
                    <div class="radio-group" id="serverGroup">
                        </div>
                </div>
            </div>

            <div id="loaderArea" class="hidden"></div>
            
        </div>
    </main>

    <script src="../public/js/main.js"></script>
</body>
</html>
